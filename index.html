    + '<button class="no-print" onclick="window.close()" style="margin-left:6px">Close</button>'
    + '<h1>' + title + '</h1>'
    + '<p class="sub">' + new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) + '</p>';

  // Page 1: Teams & Players
  html += '<h2>Teams &amp; Players</h2>';
  for (let ti = 0; ti < 3; ti++) {
    const tname = esc(teams[ti].name);
    html += '<div class="team"><div class="tn">' + tname + '</div>';
    ['mens','mixed'].forEach(cat => {
      html += '<div style="margin-left:10px;margin-bottom:6px"><strong>' + catLabels[cat] + '</strong><br>';
      const count = cat === 'mens' ? 3 : 2;
      for (let pi = 0; pi < count; pi++) {
        const p = getPlayers(cat, ti, pi);
        html += '<div class="pair">Pair ' + (pi+1) + ': ' + esc(p[0]) + ' &amp; ' + esc(p[1]) + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // Page 2: Preliminary Round
  html += '<div class="pb"></div><h2>Preliminary Round</h2>';
  combinedSlots.forEach((slot, si) => {
    html += '<h3>Round ' + (si+1) + '</h3>'
      + '<table><thead><tr><th style="width:60px">Court</th><th>Match</th><th style="width:50px" class="c">Score</th></tr></thead><tbody>';
    if (slot.courtA) {
      const m = slot.courtA;
      const e = scores.mens[m.id] || { s1: null, s2: null };
      const sc = (e.s1 !== null && e.s2 !== null) ? e.s1 + '-' + e.s2 : '\u2014';
      const p1 = playerStr('mens', m.t1, m.p1);
      const p2 = playerStr('mens', m.t2, m.p2);
      html += '<tr><td>Court A</td><td>' + esc(teams[m.t1].name) + ' (' + p1 + ') vs ' + esc(teams[m.t2].name) + ' (' + p2 + ')</td><td class="c">' + sc + '</td></tr>';
    } else {
      html += '<tr><td>Court A</td><td style="color:#9b9b97">\u2014</td><td class="c">\u2014</td></tr>';
    }
    if (slot.courtB) {
      const m = slot.courtB;
      const e = scores.mixed[m.id] || { s1: null, s2: null };
      const sc = (e.s1 !== null && e.s2 !== null) ? e.s1 + '-' + e.s2 : '\u2014';
      const p1 = playerStr('mixed', m.t1, m.p1);
      const p2 = playerStr('mixed', m.t2, m.p2);
      html += '<tr><td>Court B</td><td>' + esc(teams[m.t1].name) + ' (' + p1 + ') vs ' + esc(teams[m.t2].name) + ' (' + p2 + ')</td><td class="c">' + sc + '</td></tr>';
    } else {
      html += '<tr><td>Court B</td><td style="color:#9b9b97">\u2014</td><td class="c">\u2014</td></tr>';
    }
    html += '</tbody></table>';
  });

  // Page 3: Summary & Stats
  html += '<div class="pb"></div><h2>Summary &amp; Stats</h2>';
  for (let ti = 0; ti < 3; ti++) {
    html += '<div class="team"><div class="tn">' + esc(teams[ti].name) + '</div>';
    ['mens','mixed'].forEach(cat => {
      const stats = computeStats(cat);
      const s = stats[ti];
      const pd = s.pf - s.pa;
      const pdStr = (pd >= 0 ? '+' : '') + pd;
      html += '<p style="margin:4px 0 4px 10px"><strong>' + catLabels[cat] + ':</strong> ' + s.wins + 'W-' + s.losses + 'L &nbsp; PF:' + s.pf + ' PA:' + s.pa + ' &nbsp; <strong>PD: ' + pdStr + '</strong></p>';
    });
    html += '</div>';
  }

  // Standings table per category
  ['mens','mixed'].forEach(cat => {
    const stats = computeStats(cat);
    const sorted = sortedTeams(cat);
    html += '<h3>' + catLabels[cat] + ' Standings</h3>'
      + '<table><thead><tr><th style="width:30px" class="c">#</th><th>Team</th><th style="width:50px" class="c">W</th><th style="width:50px" class="c">L</th><th style="width:50px" class="c">PF</th><th style="width:50px" class="c">PA</th><th style="width:50px" class="c">PD</th></tr></thead><tbody>';
    sorted.forEach((ti, i) => {
      const s = stats[ti];
      const pd = s.pf - s.pa;
      const pdStr = (pd >= 0 ? '+' : '') + pd;
      html += '<tr><td class="c">' + (i+1) + '</td><td>' + esc(teams[ti].name) + '</td><td class="c">' + s.wins + '</td><td class="c">' + s.losses + '</td><td class="c">' + s.pf + '</td><td class="c">' + s.pa + '</td><td class="c">' + pdStr + '</td></tr>';
    });
    html += '</tbody></table>';
  });

  // Page 4: Championship
  html += '<div class="pb"></div><h2>Championship Results</h2>';
  ['mens','mixed'].forEach(cat => {
    const stats = computeStats(cat);
    const sorted = sortedTeams(cat);
    const t1 = sorted[0], t2 = sorted[1];
    const cs = champScores[cat] || { s1: null, s2: null };
    const cp1 = Array.isArray(champPairs[cat] && champPairs[cat][t1]) ? champPairs[cat][t1] : [0, 1];
    const cp2 = Array.isArray(champPairs[cat] && champPairs[cat][t2]) ? champPairs[cat][t2] : [0, 1];
    const wPlayers = getPlayers(cat, t1, Math.floor(cp1[0] / 2));
    const wPlayers2 = getPlayers(cat, t1, Math.floor(cp1[1] / 2));
    const lPlayers = getPlayers(cat, t2, Math.floor(cp2[0] / 2));
    const lPlayers2 = getPlayers(cat, t2, Math.floor(cp2[1] / 2));
    const names1 = [wPlayers[cp1[0] % 2], wPlayers2[cp1[1] % 2]];
    const names2 = [lPlayers[cp2[0] % 2], lPlayers2[cp2[1] % 2]];

    html += '<h3>' + catLabels[cat] + ' Championship</h3>'
      + '<div class="cb">'
      + '<p><strong>' + esc(teams[t1].name) + '</strong> (#1 seed, ' + stats[t1].wins + 'W-' + stats[t1].losses + 'L) vs <strong>' + esc(teams[t2].name) + '</strong> (#2 seed, ' + stats[t2].wins + 'W-' + stats[t2].losses + 'L)</p>'
      + '<p>Players: ' + esc(names1[0]) + ' &amp; ' + esc(names1[1]) + ' vs ' + esc(names2[0]) + ' &amp; ' + esc(names2[1]) + '</p>';
    if (cs.s1 !== null && cs.s2 !== null && cs.s1 !== cs.s2) {
      const wTeam = cs.s1 > cs.s2 ? t1 : t2;
      html += '<p class="win">Winner: ' + esc(teams[wTeam].name) + ' \u2014 ' + cs.s1 + '-' + cs.s2 + '</p>';
    } else {
      html += '<p style="color:#9b9b97">No scores entered yet.</p>';
    }
    html += '</div>';
  });

  html += '<p class="np">Generated by Pickleball Tournament Manager</p></body></html>';

  w.document.write(html);
  w.document.close();
}

// --- Supabase sync via REST API (no SDK needed) ---
var POLL_INTERVAL = 2000; // viewers check for updates every 2s

function applyState(d) {
  teams = d.teams || [];
  schedule = d.schedule || { mens: [], mixed: [] };
  scores = d.scores || { mens: {}, mixed: {} };
  combinedSlots = d.combinedSlots || [];
  champPairs = d.champPairs || { mens: {}, mixed: {} };
  champScores = d.champScores || { mens: null, mixed: null };
  champLocked = d.champLocked || { mens: false, mixed: false };
  courtTimers = d.courtTimers || { courtA: { startTime: null }, courtB: { startTime: null } };
  courtGameState = d.courtGameState || { courtA: { server: null, serverPlayer: null, serveNum: 1 }, courtB: { server: null, serverPlayer: null, serveNum: 1 } };
  courtHistory = d.courtHistory || { courtA: [], courtB: [] };
  matchDetails = d.matchDetails || {};
  pendingServePick = null;
  pendingSideoutPick = null;
  if (teams.length > 0) {
    var wasSetup = document.getElementById('page-setup').classList.contains('active');
    document.getElementById('page-setup').classList.remove('active');
    document.getElementById('page-tournament').classList.add('active');
    renderAll();
    if (wasSetup) switchTab('live');
  }
}

async function fetchState() {
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/tournament_state?id=eq.1&select=data', {
      headers: { 'apikey': SUPABASE_ANON_KEY }
    });
    var json = await res.json();
    if (json.length > 0 && json[0].data && json[0].data.teams && json[0].data.teams.length > 0) {
      applyState(json[0].data);
    }
  } catch(e) {}
}

async function sendStateToSupabase() {
  try {
    var state = { teams: teams, schedule: schedule, scores: scores, combinedSlots: combinedSlots, champPairs: champPairs, champScores: champScores, champLocked: champLocked, courtTimers: courtTimers, courtGameState: courtGameState, courtHistory: courtHistory, matchDetails: matchDetails };
    await fetch(SUPABASE_URL + '/rest/v1/tournament_state?id=eq.1', {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ data: state })
    });
  } catch(e) {}
}

// Override data-modifying functions to broadcast changes
var _origGenerate = generateTournament;
generateTournament = function() {
  _origGenerate();
  sendStateToSupabase();
};

var _origSetScore = setScore;
setScore = function(cat, mid, side, value) {
  _origSetScore(cat, mid, side, value);
  sendStateToSupabase();
};

var _origSetScoreLive = setScoreLive;
setScoreLive = function(cat, mid, side, value) {
  _origSetScoreLive(cat, mid, side, value);
  sendStateToSupabase();
};

var _origSetChampPlayer = setChampPlayer;
setChampPlayer = function(cat, side, slot, value) {
  _origSetChampPlayer(cat, side, slot, value);
  sendStateToSupabase();
};

var _origSetChampScore = setChampScore;
setChampScore = function(cat, side, value) {
  _origSetChampScore(cat, side, value);
  sendStateToSupabase();
};

// Sync tab highlights when user clicks a label (radio change)
document.querySelectorAll('.tab-radio').forEach(function(r) {
  r.addEventListener('change', function() {
    var tab = this.id.replace('r-', '');
    switchTab(tab);
  });
});

// Start: fetch existing state, poll only for viewers
fetchState();
if (!isAdmin) setInterval(fetchState, POLL_INTERVAL);
document.getElementById('connection-status').textContent = 'Live';
document.getElementById('connection-status').style.background = '#D13161';

// Start up
if (!isAdmin) {
  var tb = document.getElementById('admin-toolbar');
  if (tb) tb.style.display = 'none';
}
buildSetupUI();
</script>
