<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Tournament Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f2f2f2;
    --bg3: #e6e8ee;
    --text: #06214A;
    --text2: #4a5a7a;
    --text3: #8a94a6;
    --border: rgba(6,33,74,0.08);
    --border2: rgba(6,33,74,0.18);
    --shadow: 0 1px 3px rgba(6,33,74,0.06), 0 1px 2px rgba(6,33,74,0.04);
    --shadow-hover: 0 4px 12px rgba(6,33,74,0.08);
    --success-bg: #fce4ec;
    --success-text: #D13161;
    --warning-bg: #f7e9ce;
    --warning-text: #7a4a04;
    --danger-text: #D13161;
    --info-bg: #e8edf5;
    --info-text: #06214A;
    --radius-md: 8px;
    --radius-lg: 12px;
    --transition: 0.2s ease;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1a2e;
      --bg2: #162240;
      --bg3: #1e2d50;
      --text: #e8ecf2;
      --text2: #9aabc4;
      --text3: #6a7a94;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.18);
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
      --success-bg: #2d1020;
      --success-text: #D13161;
      --warning-bg: #3d2200;
      --warning-text: #f2c06a;
      --danger-text: #ff6b8a;
      --info-bg: #0a1a3a;
      --info-text: #7ab0e0;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.6;
  }

  .container { max-width: 800px; margin: 0 auto; }

  .app-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 2rem;
  }

  .app-icon {
    width: 44px; height: 44px;
    background: var(--text);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    color: var(--bg);
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }

  h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.01em; }
  h2 { font-size: 20px; font-weight: 600; margin-bottom: 14px; }
  h3 { font-size: 16px; font-weight: 600; margin-bottom: 10px; letter-spacing: -0.01em; }

  .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.5; }

  .page { display: none; }
  .page.active { display: block; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
    transition: box-shadow var(--transition), transform var(--transition);
  }

  .card:hover { box-shadow: var(--shadow-hover); }

  .team-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 0.5px solid var(--border);
  }

  .team-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 1px 2px rgba(0,0,0,0.15); }

  .team-name-input {
    font-size: 16px;
    font-weight: 500;
    width: 200px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 6px 10px;
    background: var(--bg);
    color: var(--text);
  }

  .pairs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  @media (max-width: 520px) {
    .pairs-grid { grid-template-columns: 1fr; }
    .court-row { grid-template-columns: 1fr !important; }
    .standings-grid { grid-template-columns: 1fr !important; }
  }

  .cat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .pair-row {
    display: grid;
    grid-template-columns: 60px 1fr 1fr;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }

  .pair-label { font-size: 12px; color: var(--text3); font-weight: 450; }

  input[type=text] {
    width: 100%;
    font-size: 14px;
    padding: 6px 10px;
    height: 36px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type=text]:focus { border-color: var(--border2); box-shadow: 0 0 0 2px var(--border); }
  input[type=text]::placeholder { color: var(--text3); }

  input[type=number] {
    font-size: 14px;
    padding: 4px 6px;
    width: 50px;
    height: 34px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    outline: none;
    text-align: center;
    -moz-appearance: textfield;
    transition: border-color 0.15s;
  }

  input[type=number]:focus { border-color: var(--border2); }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 500;
    border-radius: var(--radius-md);
    cursor: pointer;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    transition: background 0.15s, opacity 0.15s, box-shadow 0.15s;
  }

  .btn:hover { background: var(--bg2); box-shadow: var(--shadow); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .btn-primary:hover { opacity: 0.88; background: var(--text); box-shadow: var(--shadow); }

  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-pink {
    background: #D13161;
    color: #fff;
    border-color: #D13161;
  }
  .btn-pink:hover { background: #b82a54; border-color: #b82a54; color: #fff; box-shadow: var(--shadow); }

  .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }

  .nav-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 1.5rem;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .nav-tab {
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    border-radius: var(--radius-md);
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    font-family: inherit;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .nav-tab:hover { background: var(--bg3); color: var(--text); }
  .nav-tab.active {
    background: var(--text);
    color: var(--bg);
    font-weight: 600;
    box-shadow: var(--shadow);
  }

  /* CSS-only tab switching via hidden radio inputs */
  .tab-radio { position:absolute;opacity:0;pointer-events:none; }
  .tab-content { display: none; }
  #r-live:checked ~ #tab-live { display: block; }
  #r-schedule:checked ~ #tab-schedule { display: block; }
  #r-championship:checked ~ #tab-championship { display: block; }
  #r-standings:checked ~ #tab-standings { display: block; }
  #r-summary:checked ~ #tab-summary { display: block; }
  #r-live:checked ~ .nav-tabs label[for="r-live"],
  #r-schedule:checked ~ .nav-tabs label[for="r-schedule"],
  #r-championship:checked ~ .nav-tabs label[for="r-championship"],
  #r-standings:checked ~ .nav-tabs label[for="r-standings"],
  #r-summary:checked ~ .nav-tabs label[for="r-summary"] {
    background: var(--text);
    color: var(--bg);
    font-weight: 500;
    box-shadow: var(--shadow);
  }

  .slot-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    margin-bottom: 10px;
  }

  .slot-header {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .match-teams {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .match-team { display:flex;align-items:center;gap:6px; }
  .team-players-vert { display:flex;flex-direction:column;line-height:1.3; }
  .tp-name { font-size:15px;font-weight:600; }

  .match-vs { color: var(--text3); font-weight: 400; font-size:12px; }

  .score-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 6px;
  }

  .score-row select {
    font-size: 14px;
    padding: 5px 8px;
    min-width: 56px;
    text-align: center;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    -moz-appearance: auto;
    appearance: auto;
  }

  .score-row select:focus { border-color: var(--border2); }

  .score-vs { color: var(--text3); margin: 0 4px; font-weight: 500; font-size: 15px; }

  .winner-row { text-align:center;margin-top:8px; }
  .winner-badge { font-size:11px;padding:4px 14px;border-radius:99px;background:var(--success-bg);color:var(--success-text);font-weight:600;letter-spacing:0.01em;display:inline-block; }
  .score-val { font-size:20px;font-weight:700;min-width:28px;text-align:center;display:inline-block; }

  .court-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .standings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .standing-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 14px;
  }

  .standing-row:last-child { border-bottom: none; }

  .rank-badge {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--bg2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .rank-badge.top { background: var(--warning-bg); color: var(--warning-text); }

  .pts { font-weight: 600; font-size: 18px; }

  .stat-detail {
    font-size: 13px;
    color: var(--text3);
    margin-top: 4px;
  }

  .pd-bar-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .pd-bar {
    display: inline-block;
    height: 6px;
    border-radius: 99px;
    min-width: 30px;
    transition: width 0.3s;
  }

  .pd-bar.pos { background: var(--success-text); }
  .pd-bar.neg { background: var(--danger-text); }
  .pd-bar.zero { background: var(--text3); }

  .progress-bar-wrap {
    background: var(--bg3);
    border-radius: 99px;
    height: 8px;
    margin-bottom: 0.75rem;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
  }

  .progress-bar { height: 100%; background: var(--text); border-radius: 99px; transition: width 0.4s ease; }

  .progress-label { font-size: 13px; color: var(--text2); margin-bottom: 10px; font-weight: 450; }

  .error { font-size: 13px; color: var(--danger-text); margin-top: 8px; }

  .advance-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--warning-bg);
    color: var(--warning-text);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .section-note {
    font-size: 13px;
    color: var(--text3);
    margin-top: 12px;
    padding-top: 12px;
    border-top: 0.5px solid var(--border);
    line-height: 1.5;
  }

  select {
    font-size: 13px;
    padding: 6px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    outline: none;
    max-width: 100%;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  select:focus { border-color: var(--border2); box-shadow: 0 0 0 2px var(--border); }

  .champ-block {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
  }

  .champ-teams {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .champ-team-box {
    flex: 1;
    min-width: 180px;
    padding: 12px 16px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg2);
    transition: box-shadow 0.15s;
  }

  .champ-team-box:hover { box-shadow: var(--shadow); }

  .champ-team-box h4 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .champ-vs {
    font-size: 15px;
    color: var(--text3);
    font-weight: 500;
  }

  .player-select-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
  }
  .player-select-row select {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    padding: 5px 8px;
  }

  .champ-score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .champ-score-row input[type=number] {
    font-size: 16px;
    width: 60px;
    height: 38px;
    font-weight: 500;
  }

  .tie-note {
    font-size: 12px;
    color: var(--text3);
    font-style: italic;
    margin-top: 4px;
  }

  .schedule-tbl {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    outline: 2px solid var(--border2);
    outline-offset: -1px;
  }

  .schedule-tbl th,
  .schedule-tbl td {
    border: 1px solid var(--border2);
    padding: 12px;
    vertical-align: top;
    transition: background 0.15s;
  }

  .schedule-tbl thead th {
    background: var(--bg3);
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    text-align: left;
    border-bottom: 1px solid var(--border2);
  }

  .schedule-tbl tbody tr:nth-child(even) td { background: var(--bg2); }
  .schedule-tbl tbody tr:nth-child(even) td.match-cell.pending { background: var(--bg2); }

  .schedule-tbl tbody tr:hover td { background: var(--bg3); }
  .schedule-tbl tbody tr:hover td.match-cell.pending { background: var(--bg3); }

  .round-cell {
    text-align: center;
    vertical-align: middle;
    white-space: nowrap;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    background: var(--bg3) !important;
  }

  .match-cell {
    padding: 16px 20px;
    vertical-align: top;
  }

  .match-cell.done { background: var(--bg); }
  .match-cell.pending { background: var(--bg); }

  .schedule-tbl tbody tr.round-current td,
  .schedule-tbl tbody tr.round-current:hover td {
    background: var(--info-bg) !important;
  }
  .round-current-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 99px;
    background: var(--info-text);
    color: #fff;
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  @keyframes champ-pop {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(20px) rotate(180deg); opacity: 0; }
  }
  .champ-winner-box {
    animation: champ-pop 0.4s ease forwards;
    position: relative;
    overflow: hidden;
  }
  .champ-winner-box::before, .champ-winner-box::after {
    content: '🎉';
    position: absolute;
    font-size: 20px;
    animation: confetti-fall 0.8s ease forwards;
    pointer-events: none;
  }
  .champ-winner-box::before { left: 10%; animation-delay: 0.1s; }
  .champ-winner-box::after { right: 10%; animation-delay: 0.3s; content: '🏆'; }

  /* Live scoreboard */
  .live-board { text-align: center; padding: 10px 0; }
  .live-board .round-label { font-size: 13px; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .live-board .round-label span { font-weight: 600; color: var(--text); }
  .live-court { margin-bottom: 32px; border-radius: 20px; overflow: hidden; color: #fff; }
  .live-court .players-vert { color: #fff !important; }
  .live-court h3 { font-size: 22px; color: #fff; margin-bottom: 10px; font-weight: 700; }
  .live-scorebox { display: flex; align-items: center; justify-content: center; gap: 32px; border-radius: 20px; padding: 40px 48px; }
  .live-controls { border-radius: 20px; padding: 16px; margin-top: 12px; }
  .live-team { flex: 1; text-align: center; min-width: 200px; }
  .live-team .players-vert { font-size: 38px; font-weight: 700; line-height: 1.2; }
  .live-score { font-size: 68px; font-weight: 700; line-height: 1; min-width: 84px; text-align: center; color: #fff; }
  .live-divider { font-size: 38px; color: #D13161; font-weight: 300; }
  .live-team.winner .name { color: #D13161; }
  .live-team.winner .name::after { content: ' ✓'; font-size: 14px; }
  .serve-indicator { margin-top: 12px; text-align: center; }
  .serve-indicator .btn { color:#fff;border-color:rgba(255,255,255,0.3); }
  .serve-indicator .btn:hover { background:rgba(255,255,255,0.1); }
  .serve-badge { display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:600;padding:6px 16px;border-radius:20px;border:1px solid;background:#D13161;color:#fff;border-color:#D13161; }
  .court-mens .serve-badge { background:#D13161 !important; border-color:#D13161 !important; }
  .court-mixed .serve-badge { background:#06214A !important; border-color:#06214A !important; }
  .btn-sideout { border-color:#fff;color:#fff; }
  .btn-sideout:hover { background:#fff;color:#06214A; }
  .court-mens .btn-sideout { border-color:#D13161;color:#D13161; }
  .court-mens .btn-sideout:hover { background:#D13161;color:#fff; }
  .court-mixed .btn-sideout { border-color:#06214A;color:#06214A; }
  .court-mixed .btn-sideout:hover { background:#06214A;color:#fff; }
  .match-history { margin-top:10px;padding:10px 14px;border-radius:var(--radius-md); }
  .match-history .hist-label { color:rgba(255,255,255,0.6); }
  .hist-legend { font-weight:600; }
  .hist-bars { display:flex;flex-wrap:wrap;gap:4px;align-items:center; }
  .hist-dot { display:inline-block;width:10px;height:10px;border-radius:50%;border:1px solid; }
  .live-court .court-timer { color:#fff; }
  .live-court .btn-start { color:#fff;border-color:rgba(255,255,255,0.3); }
  .court-mens .btn-start { background:#D13161;border-color:#D13161; }
  .court-mixed .btn-start { background:#06214A;border-color:#06214A; }
  .live-court .btn-start:hover { background:rgba(255,255,255,0.1); }
  .court-mens .btn-start:hover { background:#b82a54;border-color:#b82a54; }
  .court-mixed .btn-start:hover { opacity:0.85; }
  .serve-picker { margin:10px 0;padding:12px 16px;background:rgba(255,255,255,0.08);border-radius:var(--radius-md);border:2px solid #D13161;text-align:center; }
  .serve-picker-label { font-size:14px;font-weight:600;color:#fff;margin-bottom:10px; }
  .match-timeline { display:none;margin-top:10px;padding:10px 14px;background:rgba(255,255,255,0.08);border-radius:var(--radius-md);font-size:12px;max-height:240px;overflow-y:auto; }
  .match-timeline .tl-item { display:flex;align-items:center;gap:6px;padding:3px 0; }
  .match-timeline .tl-item + .tl-item { border-top:0.5px solid rgba(255,255,255,0.1); }
  .match-timeline .tl-time { font-size:11px;color:rgba(255,255,255,0.4);margin-left:auto;white-space:nowrap; }
  .match-timeline .tl-dot { width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0; }
  .match-timeline-wrap { text-align:center; }
  .match-timeline.open { display:block; }

<script>
const TEAM_COLORS = ['#378ADD','#1D9E75','#D85A30'];

let schedule = { mens: [], mixed: [] };
